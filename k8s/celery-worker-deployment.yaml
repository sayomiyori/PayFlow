apiVersion: apps/v1
kind: Deployment
metadata:
  name: payflow-celery-worker
  namespace: payflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payflow-celery-worker
  template:
    metadata:
      labels:
        app: payflow-celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/sayomiyori/payflow:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.workers.celery_app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=4
          envFrom:
            - configMapRef:
                name: payflow-config
            - secretRef:
                name: payflow-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
