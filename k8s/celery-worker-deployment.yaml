apiVersion: apps/v1
kind: Deployment
metadata:
  name: payflow-celery-worker
  namespace: payflow
  labels:
    app.kubernetes.io/name: payflow-celery-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payflow-celery-worker
  template:
    metadata:
      labels:
        app: payflow-celery-worker
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: celery-worker
          image: ghcr.io/sayomiyori/payflow:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.workers.celery_app.celery_app
            - worker
            - --loglevel=INFO
            - --concurrency=4
          envFrom:
            - configMapRef:
                name: payflow-config
            - secretRef:
                name: payflow-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
