apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-api
  namespace: payflow
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - api.payflow.example.com
      secretName: payflow-api-tls
  rules:
    - host: api.payflow.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payflow-api
                port:
                  number: 80
